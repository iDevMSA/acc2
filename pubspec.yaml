name: monsati_accounting
description: تطبيق محاسبي متكامل مع مصادقة فايربيز ودعم متعدد العملات.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  pdf: ^3.10.4          # لتوليد ملفات PDF
  printing: ^5.11.0     # للطباعة والمشاركة
  intl: ^0.18.1         # لتنسيق التواريخ والأرقام
  font_awesome_flutter: ^10.6.0


  # 🔗 الاتصال والشبكة
  connectivity_plus: ^5.0.2
  http: ^1.1.2

  # 🔥 فايربيز - استخدام إصدارات متوافقة
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.15.5
  google_sign_in: ^6.2.1
  firebase_database: ^10.4.9  # ✅ إصدار متوافق مع firebase_core ^2.24.2

  # 💾 التخزين المحلي
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  flutter_secure_storage: ^9.0.0

  # 🎨 واجهة المستخدم والرسوم
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  awesome_dialog: ^3.2.1
  fluttertoast: ^8.2.14
  fl_chart: ^0.66.2

  # 🌍 أدوات مساعدة
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  package_info_plus: ^9.0.1
  
  # ⚙️ إدارة الحالة والأدوات
  provider: ^6.1.1
  logger: ^2.0.2+1
  uuid: ^4.3.3
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"  # ضع صورتك هنا

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/translations/
    - assets/fonts/Cairo-Regular.ttf